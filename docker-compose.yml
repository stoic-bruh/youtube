version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: youtube_factory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_secret}
      POSTGRES_DB: youtube_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youtube_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Python FastAPI Backend ───────────────────────────────────────────────────
  youtube-factory-api:
    build:
      context: ./services/youtube-factory-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: "postgresql+asyncpg://youtube_factory:${POSTGRES_PASSWORD:-dev_secret}@postgres:5432/youtube_factory"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEBUG: "false"
      LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage

  # ── Celery Worker (Pipeline) ─────────────────────────────────────────────────
  celery-worker-pipeline:
    build:
      context: ./services/youtube-factory-api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=pipeline --concurrency=2
    environment:
      DATABASE_URL: "postgresql+asyncpg://youtube_factory:${POSTGRES_PASSWORD:-dev_secret}@postgres:5432/youtube_factory"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - youtube-factory-api
    volumes:
      - storage_data:/app/storage

  # ── Celery Worker (Media) ────────────────────────────────────────────────────
  celery-worker-media:
    build:
      context: ./services/youtube-factory-api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=media --concurrency=1
    environment:
      DATABASE_URL: "postgresql+asyncpg://youtube_factory:${POSTGRES_PASSWORD:-dev_secret}@postgres:5432/youtube_factory"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - youtube-factory-api
    volumes:
      - storage_data:/app/storage

  # ── Celery Beat (Scheduler) ──────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./services/youtube-factory-api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: "postgresql+asyncpg://youtube_factory:${POSTGRES_PASSWORD:-dev_secret}@postgres:5432/youtube_factory"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      - redis

  # ── Node.js API Server ───────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      DATABASE_URL: "postgresql://youtube_factory:${POSTGRES_PASSWORD:-dev_secret}@postgres:5432/youtube_factory"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (production build) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-server

volumes:
  postgres_data:
  redis_data:
  storage_data:
