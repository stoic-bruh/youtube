openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: Autonomous YouTube Factory API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Video project management
  - name: pipelines
    description: Pipeline execution and monitoring
  - name: jobs
    description: Background job management
  - name: services
    description: AI service execution
  - name: analytics
    description: Channel and video analytics
  - name: settings
    description: Application configuration
  - name: logs
    description: System log access
  - name: research
    description: AI research service
  - name: scripts
    description: AI script generation service
  - name: assets
    description: Asset Intelligence Engine — image/video/icon acquisition
  - name: timelines
    description: Media Timeline Engine — merge Storyboard + Assets into production timeline
  - name: voices
    description: Voice Engine — narration audio generation from scripts
  - name: renders
    description: Render Engine — MoviePy/FFmpeg composition of Timeline + Voice + Assets into a final MP4
  - name: subtitles
    description: Post-Processing — Subtitle Engine (Whisper transcription, SRT/VTT/ASS export)
  - name: thumbnails
    description: Post-Processing — Thumbnail Engine (frame selection, quality scoring, templates)
  - name: chapters
    description: Post-Processing — Chapter Engine (YouTube chapter generation)
  - name: production-assets
    description: Post-Processing — aggregated production asset bundle for a render

paths:
  # ── Research ──────────────────────────────────────────────────────────────
  /research:
    get:
      operationId: listResearch
      tags: [research]
      summary: List research results
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Research list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchList"
    post:
      operationId: startResearch
      tags: [research]
      summary: Start an async research job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchInput"
      responses:
        "202":
          description: Research job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResult"

  /research/{id}:
    get:
      operationId: getResearch
      tags: [research]
      summary: Get research result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Research result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResult"
        "404":
          description: Not found
    delete:
      operationId: deleteResearch
      tags: [research]
      summary: Delete a research result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Storyboards ────────────────────────────────────────────────────────────
  /storyboards:
    get:
      operationId: listStoryboards
      tags: [storyboards]
      summary: List storyboard results
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Storyboard list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardList"
    post:
      operationId: startStoryboard
      tags: [storyboards]
      summary: Start an async storyboard-generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryboardInput"
      responses:
        "202":
          description: Storyboard job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardResult"

  /storyboards/{id}:
    get:
      operationId: getStoryboard
      tags: [storyboards]
      summary: Get storyboard result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Storyboard result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardResult"
        "404":
          description: Not found
    delete:
      operationId: deleteStoryboard
      tags: [storyboards]
      summary: Delete a storyboard result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Assets ────────────────────────────────────────────────────────────────
  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List asset results
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
        - name: storyboardId
          in: query
          schema:
            type: ["string", "null"]
        - name: sceneId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: assetKind
          in: query
          schema:
            type: ["string", "null"]
        - name: provider
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetList"
    post:
      operationId: acquireAssets
      tags: [assets]
      summary: Enqueue asset acquisition for a storyboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "202":
          description: Asset acquisition queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetAcquireResponse"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResult"
        "404":
          description: Not found
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /assets/providers:
    get:
      operationId: listAssetProviders
      tags: [assets]
      summary: List asset provider statistics
      responses:
        "200":
          description: Provider statistics list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetProviderStatsList"

  # ── Timelines ─────────────────────────────────────────────────────────────
  /timelines:
    get:
      operationId: listTimelines
      tags: [timelines]
      summary: List media timeline results
      parameters:
        - name: storyboardId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Timeline list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineList"
    post:
      operationId: buildTimeline
      tags: [timelines]
      summary: Build a media timeline from a storyboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineInput"
      responses:
        "202":
          description: Timeline build accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineResult"

  /timelines/{id}:
    get:
      operationId: getTimeline
      tags: [timelines]
      summary: Get a timeline by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Timeline result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineResult"
        "404":
          description: Not found
    delete:
      operationId: deleteTimeline
      tags: [timelines]
      summary: Delete a timeline record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Scripts ───────────────────────────────────────────────────────────────
  /scripts:
    get:
      operationId: listScripts
      tags: [scripts]
      summary: List script results
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Script list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptList"
    post:
      operationId: startScript
      tags: [scripts]
      summary: Start an async script-generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptInput"
      responses:
        "202":
          description: Script job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptResult"

  /scripts/{id}:
    get:
      operationId: getScript
      tags: [scripts]
      summary: Get script result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Script result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptResult"
        "404":
          description: Not found
    delete:
      operationId: deleteScript
      tags: [scripts]
      summary: Delete a script result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Voices ────────────────────────────────────────────────────────────────
  /voices:
    get:
      operationId: listVoices
      tags: [voices]
      summary: List voice (narration) generation results
      parameters:
        - name: scriptId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Voice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceList"
    post:
      operationId: startVoice
      tags: [voices]
      summary: Start a narration (TTS) generation job for a script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceInput"
      responses:
        "202":
          description: Voice generation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceResult"

  /voices/{id}:
    get:
      operationId: getVoice
      tags: [voices]
      summary: Get a voice result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Voice result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceResult"
        "404":
          description: Not found
    delete:
      operationId: deleteVoice
      tags: [voices]
      summary: Delete a voice record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /voices/providers/stats:
    get:
      operationId: getVoiceProviderStats
      tags: [voices]
      summary: Aggregate usage/success statistics per voice provider
      responses:
        "200":
          description: Provider statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceProviderStatsList"

  /renders:
    get:
      operationId: listRenders
      tags: [renders]
      summary: List render jobs (the Render Queue)
      parameters:
        - name: timelineId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Render list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderList"
    post:
      operationId: startRender
      tags: [renders]
      summary: Enqueue a render job for a completed timeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderInput"
      responses:
        "202":
          description: Render accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResult"

  /renders/{id}:
    get:
      operationId: getRender
      tags: [renders]
      summary: Get a render result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Render result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResult"
        "404":
          description: Not found
    delete:
      operationId: deleteRender
      tags: [renders]
      summary: Delete a render record (and its output file, if present)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /renders/providers/stats:
    get:
      operationId: getRenderProviderStats
      tags: [renders]
      summary: Aggregate render-engine statistics (single backend — MoviePy)
      responses:
        "200":
          description: Render engine statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderProviderStats"

  # ── Subtitles (Post-Processing) ──────────────────────────────────────────────
  /subtitles:
    get:
      operationId: listSubtitles
      tags: [subtitles]
      summary: List subtitle jobs
      parameters:
        - name: renderId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Subtitle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtitleList"
    post:
      operationId: startSubtitle
      tags: [subtitles]
      summary: Transcribe a completed render's audio and generate SRT/VTT/ASS captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubtitleInput"
      responses:
        "202":
          description: Subtitle job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtitleResult"

  /subtitles/{id}:
    get:
      operationId: getSubtitle
      tags: [subtitles]
      summary: Get a subtitle result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subtitle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtitleResult"
        "404":
          description: Not found
    delete:
      operationId: deleteSubtitle
      tags: [subtitles]
      summary: Delete a subtitle record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /subtitles/{id}/file/{format}:
    get:
      operationId: getSubtitleFile
      tags: [subtitles]
      summary: Download a subtitle export file (SRT/VTT/ASS)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [srt, vtt, ass]
      responses:
        "200":
          description: Subtitle file stream
        "404":
          description: Not found

  # ── Thumbnails (Post-Processing) ─────────────────────────────────────────────
  /thumbnails:
    get:
      operationId: listThumbnails
      tags: [thumbnails]
      summary: List thumbnail jobs
      parameters:
        - name: renderId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Thumbnail list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailList"
    post:
      operationId: startThumbnail
      tags: [thumbnails]
      summary: Extract and score candidate thumbnail frames from a completed render
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThumbnailInput"
      responses:
        "202":
          description: Thumbnail job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailResult"

  /thumbnails/{id}:
    get:
      operationId: getThumbnail
      tags: [thumbnails]
      summary: Get a thumbnail result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thumbnail result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailResult"
        "404":
          description: Not found
    delete:
      operationId: deleteThumbnail
      tags: [thumbnails]
      summary: Delete a thumbnail record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /thumbnails/{id}/file/{candidateId}:
    get:
      operationId: getThumbnailFile
      tags: [thumbnails]
      summary: Download a candidate thumbnail JPEG by candidate ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: candidateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thumbnail image stream
        "404":
          description: Not found

  # ── Chapters (Post-Processing) ───────────────────────────────────────────────
  /chapters:
    get:
      operationId: listChapters
      tags: [chapters]
      summary: List chapter jobs
      parameters:
        - name: renderId
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Chapter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterList"
    post:
      operationId: startChapter
      tags: [chapters]
      summary: Generate YouTube chapters from Timeline/Script/Voice timestamps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterInput"
      responses:
        "202":
          description: Chapter job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterResult"

  /chapters/{id}:
    get:
      operationId: getChapter
      tags: [chapters]
      summary: Get a chapter result by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chapter result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterResult"
        "404":
          description: Not found
    delete:
      operationId: deleteChapter
      tags: [chapters]
      summary: Delete a chapter record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Production Assets (Post-Processing) ──────────────────────────────────────
  /production-assets:
    get:
      operationId: listProductionAssets
      tags: [production-assets]
      summary: List production asset bundles
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Production asset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionAssetList"

  /production-assets/{renderId}:
    get:
      operationId: getProductionAssets
      tags: [production-assets]
      summary: Get (or lazily assemble) the production asset bundle for a render
      parameters:
        - name: renderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Production asset bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionAssetResult"
        "404":
          description: Not found

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Projects ──────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{id}/run:
    post:
      operationId: runProject
      tags: [projects]
      summary: Start the full pipeline for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Pipeline started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  # ── Pipelines ─────────────────────────────────────────────────────────────
  /pipelines:
    get:
      operationId: listPipelines
      tags: [pipelines]
      summary: List pipeline runs
      parameters:
        - name: project_id
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Pipeline list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineList"

  /pipelines/{id}:
    get:
      operationId: getPipeline
      tags: [pipelines]
      summary: Get pipeline run details and stage progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pipeline run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  /pipelines/{id}/cancel:
    post:
      operationId: cancelPipeline
      tags: [pipelines]
      summary: Cancel a running pipeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  /pipelines/{id}/retry:
    post:
      operationId: retryPipeline
      tags: [pipelines]
      summary: Retry a failed pipeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Retried
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  # ── Jobs ──────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List background jobs
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/retry:
    post:
      operationId: retryJob
      tags: [jobs]
      summary: Retry a failed job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Retried
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a pending or running job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  # ── Dashboard / Analytics ─────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Aggregate dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/pipeline-activity:
    get:
      operationId: getPipelineActivity
      tags: [analytics]
      summary: Recent pipeline activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityFeed"

  /analytics/stage-breakdown:
    get:
      operationId: getStageBreakdown
      tags: [analytics]
      summary: Pipeline stage success/failure breakdown
      responses:
        "200":
          description: Stage breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageBreakdown"

  # ── Logs ──────────────────────────────────────────────────────────────────
  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List system log entries
      parameters:
        - name: level
          in: query
          schema:
            type: ["string", "null"]
        - name: service
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogList"

  # ── Settings ──────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Research ─────────────────────────────────────────────────────────────
    ResearchInput:
      type: object
      required: [topic]
      properties:
        topic:             { type: string }
        targetAudience:    { type: string }
        videoLengthMinutes: { type: integer }
        language:          { type: string }
        style:             { type: string }
        tone:              { type: string }
        providers:
          type: array
          items: { type: string }

    ResearchKeyword:
      type: object
      required: [term, relevance]
      properties:
        term:         { type: string }
        relevance:    { type: number }
        searchVolume: { type: ["integer", "null"] }
        difficulty:   { type: ["string", "null"] }
        semanticTags:
          type: array
          items: { type: string }

    ResearchReference:
      type: object
      required: [title, url, sourceType, credibilityScore, citationFormat]
      properties:
        id:               { type: string }
        title:            { type: string }
        url:              { type: string }
        sourceType:       { type: string }
        author:           { type: ["string", "null"] }
        publishedAt:      { type: ["string", "null"] }
        snippet:          { type: ["string", "null"] }
        credibilityScore: { type: number }
        citationFormat:   { type: string }
        provider:         { type: string }

    ResearchSection:
      type: object
      required: [sectionType, title, content, confidence]
      properties:
        sectionType:  { type: string }
        title:        { type: string }
        content:      { type: string }
        confidence:   { type: number }
        items:
          type: array
          items: { type: string }
        sourceIds:
          type: array
          items: { type: string }

    ResearchResult:
      type: object
      required: [id, topic, status, providers, usedProviders, sections, references, keywords, logs, createdAt, updatedAt]
      properties:
        id:                  { type: string }
        topic:               { type: string }
        targetAudience:      { type: ["string", "null"] }
        videoLengthMinutes:  { type: integer }
        language:            { type: string }
        style:               { type: string }
        tone:                { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed, cached]
        jobId:               { type: ["string", "null"] }
        summary:             { type: ["string", "null"] }
        confidenceScore:     { type: ["number", "null"] }
        estimatedDifficulty: { type: ["string", "null"] }
        sections:
          type: array
          items: { $ref: "#/components/schemas/ResearchSection" }
        references:
          type: array
          items: { $ref: "#/components/schemas/ResearchReference" }
        keywords:
          type: array
          items: { $ref: "#/components/schemas/ResearchKeyword" }
        providers:
          type: array
          items: { type: string }
        usedProviders:
          type: array
          items: { type: string }
        logs:
          type: array
          items: { type: string }
        errorMessage:  { type: ["string", "null"] }
        createdAt:     { type: string }
        updatedAt:     { type: string }
        completedAt:   { type: ["string", "null"] }

    ResearchList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ResearchResult" }
        total: { type: integer }

    # ── Project ──────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, title, status, topic, createdAt, updatedAt]
      properties:
        id:          { type: string }
        title:       { type: string }
        topic:       { type: string }
        description: { type: ["string", "null"] }
        status:
          type: string
          enum: [draft, queued, running, completed, failed, cancelled]
        thumbnailUrl:  { type: ["string", "null"] }
        videoUrl:      { type: ["string", "null"] }
        youtubeId:     { type: ["string", "null"] }
        youtubeUrl:    { type: ["string", "null"] }
        pipelineId:    { type: ["string", "null"] }
        tags:
          type: array
          items: { type: string }
        createdAt:   { type: string }
        updatedAt:   { type: string }

    ProjectInput:
      type: object
      required: [title, topic]
      properties:
        title:       { type: string }
        topic:       { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }

    ProjectUpdate:
      type: object
      properties:
        title:       { type: string }
        topic:       { type: string }
        description: { type: string }
        status:      { type: string }
        tags:
          type: array
          items: { type: string }

    ProjectList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Project" }
        total: { type: integer }

    # ── Pipeline ─────────────────────────────────────────────────────────────
    PipelineRun:
      type: object
      required: [id, projectId, status, stages, startedAt]
      properties:
        id:          { type: string }
        projectId:   { type: string }
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        currentStage: { type: ["string", "null"] }
        progress:     { type: integer }
        stages:
          type: array
          items: { $ref: "#/components/schemas/PipelineStage" }
        startedAt:    { type: string }
        completedAt:  { type: ["string", "null"] }
        errorMessage: { type: ["string", "null"] }

    PipelineStage:
      type: object
      required: [name, status, order]
      properties:
        name:       { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
        order:      { type: integer }
        startedAt:  { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }
        durationMs: { type: ["integer", "null"] }
        error:      { type: ["string", "null"] }

    PipelineList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PipelineRun" }
        total: { type: integer }

    # ── Job ──────────────────────────────────────────────────────────────────
    Job:
      type: object
      required: [id, type, status, createdAt]
      properties:
        id:          { type: string }
        type:        { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, retrying]
        projectId:   { type: ["string", "null"] }
        pipelineId:  { type: ["string", "null"] }
        payload:
          type: object
          additionalProperties: {}
        result:
          type: ["object", "null"]
          additionalProperties: {}
        error:       { type: ["string", "null"] }
        retryCount:  { type: integer }
        maxRetries:  { type: integer }
        createdAt:   { type: string }
        startedAt:   { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }

    JobList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Job" }
        total: { type: integer }

    # ── Analytics ────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalProjects, totalVideos, activeJobs, queuedJobs, successRate, totalRuntime]
      properties:
        totalProjects: { type: integer }
        totalVideos:   { type: integer }
        activeJobs:    { type: integer }
        queuedJobs:    { type: integer }
        failedJobs:    { type: integer }
        successRate:   { type: number }
        totalRuntime:  { type: integer }
        projectsByStatus:
          type: array
          items: { $ref: "#/components/schemas/StatusCount" }
        recentActivity:
          type: array
          items: { $ref: "#/components/schemas/ActivityItem" }

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count:  { type: integer }

    ActivityItem:
      type: object
      required: [id, type, message, timestamp]
      properties:
        id:        { type: string }
        type:      { type: string }
        message:   { type: string }
        projectId: { type: ["string", "null"] }
        status:    { type: ["string", "null"] }
        timestamp: { type: string }

    ActivityFeed:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ActivityItem" }

    StageBreakdown:
      type: object
      required: [stages]
      properties:
        stages:
          type: array
          items: { $ref: "#/components/schemas/StageStats" }

    StageStats:
      type: object
      required: [name, completed, failed, avgDurationMs]
      properties:
        name:          { type: string }
        completed:     { type: integer }
        failed:        { type: integer }
        avgDurationMs: { type: integer }

    # ── Logs ─────────────────────────────────────────────────────────────────
    LogEntry:
      type: object
      required: [id, level, message, service, timestamp]
      properties:
        id:        { type: string }
        level:
          type: string
          enum: [debug, info, warn, error]
        message:   { type: string }
        service:   { type: string }
        projectId: { type: ["string", "null"] }
        jobId:     { type: ["string", "null"] }
        meta:
          type: ["object", "null"]
          additionalProperties: {}
        timestamp: { type: string }

    LogList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/LogEntry" }
        total: { type: integer }

    # ── Settings ─────────────────────────────────────────────────────────────
    Settings:
      type: object
      required: [id, youtubeEnabled, autoUpload, defaultLanguage, maxConcurrentJobs, updatedAt]
      properties:
        id:                  { type: string }
        youtubeEnabled:      { type: boolean }
        autoUpload:          { type: boolean }
        defaultLanguage:     { type: string }
        maxConcurrentJobs:   { type: integer }
        openaiModel:         { type: string }
        imageProvider:       { type: string }
        voiceProvider:       { type: string }
        defaultVideoQuality: { type: string }
        notificationsEmail:  { type: ["string", "null"] }
        webhookUrl:          { type: ["string", "null"] }
        updatedAt:           { type: string }

    SettingsUpdate:
      type: object
      properties:
        youtubeEnabled:      { type: boolean }
        autoUpload:          { type: boolean }
        defaultLanguage:     { type: string }
        maxConcurrentJobs:   { type: integer }
        openaiModel:         { type: string }
        imageProvider:       { type: string }
        voiceProvider:       { type: string }
        defaultVideoQuality: { type: string }
        notificationsEmail:  { type: string }
        webhookUrl:          { type: string }

    # ── Scripts ───────────────────────────────────────────────────────────────
    ScriptInput:
      type: object
      required: [topic]
      properties:
        researchId:            { type: ["string", "null"] }
        topic:                 { type: string, minLength: 3, maxLength: 500 }
        style:
          type: string
          enum: [educational, documentary, storytelling, tutorial, news, long_form, shorts]
        tone:
          type: string
          enum: [engaging, authoritative, casual, inspirational, conversational]
        language:              { type: string }
        targetAudience:        { type: string }
        targetDurationMinutes: { type: integer, minimum: 1, maximum: 120 }
        providers:
          type: array
          items: { type: string }

    ScriptSection:
      type: object
      required: [sectionType, title, content]
      properties:
        sectionType:        { type: string }
        title:              { type: string }
        content:            { type: string }
        wordCount:          { type: integer }
        durationSeconds:    { type: number }
        order:              { type: integer }
        transitionIn:       { type: ["string", "null"] }
        transitionOut:      { type: ["string", "null"] }
        storytellingNotes:  { type: ["string", "null"] }
        visualSuggestion:   { type: ["string", "null"] }

    ScriptResult:
      type: object
      required: [id, topic, status, providers, usedProviders, sections, logs, createdAt, updatedAt]
      properties:
        id:                      { type: string }
        researchId:              { type: ["string", "null"] }
        topic:                   { type: string }
        title:                   { type: ["string", "null"] }
        status:
          type: string
          enum: [pending, running, completed, failed, cached]
        style:                   { type: string }
        tone:                    { type: string }
        language:                { type: string }
        targetAudience:          { type: string }
        targetDurationMinutes:   { type: integer }
        version:                 { type: integer }
        hook:                    { type: ["string", "null"] }
        introduction:            { type: ["string", "null"] }
        outro:                   { type: ["string", "null"] }
        callToAction:            { type: ["string", "null"] }
        sections:
          type: array
          items: { $ref: "#/components/schemas/ScriptSection" }
        wordCount:               { type: ["integer", "null"] }
        estimatedDurationSeconds: { type: ["integer", "null"] }
        readingTimeSeconds:      { type: ["integer", "null"] }
        sceneCount:              { type: ["integer", "null"] }
        pacingWpm:               { type: ["number", "null"] }
        narrationTiming:
          type: array
          items: { type: object }
        emphasisMarkers:
          type: array
          items: { type: object }
        pauses:
          type: array
          items: { type: object }
        pronunciationHints:
          type: array
          items: { type: object }
        visualCues:
          type: array
          items: { type: object }
        versions:
          type: array
          items: { type: object }
        providers:
          type: array
          items: { type: string }
        usedProviders:
          type: array
          items: { type: string }
        jobId:          { type: ["string", "null"] }
        logs:
          type: array
          items: { type: string }
        errorMessage:   { type: ["string", "null"] }
        createdAt:      { type: string }
        updatedAt:      { type: string }
        completedAt:    { type: ["string", "null"] }

    ScriptList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ScriptResult" }
        total: { type: integer }

    # ── Storyboards ────────────────────────────────────────────────────────────
    StoryboardScene:
      type: object
      required: [scene_number, scene_title, start_time_ms, end_time_ms, duration_ms, narration, visual_description, prompts]
      properties:
        scene_number:              { type: integer }
        scene_title:               { type: string }
        start_time_ms:             { type: integer }
        end_time_ms:               { type: integer }
        duration_ms:               { type: integer }
        narration:                 { type: string }
        visual_description:        { type: string }
        visual_type:               { type: string }
        prompts:                   { type: object }
        shot_type:                 { type: string }
        camera_angle:              { type: string }
        camera_movement:           { type: string }
        zoom_instructions:         { type: ["string", "null"] }
        pan_instructions:          { type: ["string", "null"] }
        animation_suggestions:     { type: array, items: { type: object } }
        transition_type:           { type: string }
        transition_duration_ms:    { type: integer }
        scene_emotion:             { type: string }
        color_palette:             { type: array, items: { type: string } }
        lighting_style:            { type: string }
        background_description:    { type: string }
        foreground_description:    { type: string }
        characters:                { type: array, items: { type: string } }
        objects:                   { type: array, items: { type: string } }
        text_overlay_suggestions:  { type: array, items: { type: string } }
        subtitle_timing:           { type: ["object", "null"] }
        sound_effect_suggestions:  { type: array, items: { type: string } }
        background_music_mood:     { type: string }
        b_roll_suggestions:        { type: array, items: { type: string } }
        stock_footage_suggestions: { type: array, items: { type: string } }
        asset_requirements:        { type: array, items: { type: object } }
        importance_score:          { type: number }
        estimated_image_count:     { type: integer }
        estimated_video_length_seconds: { type: number }

    StoryboardInput:
      type: object
      required: [topic]
      properties:
        scriptId:               { type: ["string", "null"] }
        researchId:             { type: ["string", "null"] }
        topic:                  { type: string, minLength: 3, maxLength: 500 }
        scriptStyle:
          type: string
          enum: [educational, documentary, storytelling, tutorial, news, long_form, shorts]
        scriptTone:
          type: string
          enum: [engaging, authoritative, casual, inspirational, conversational]
        targetDurationMinutes:  { type: integer, minimum: 1, maximum: 120 }
        targetAudience:         { type: string }
        language:               { type: string }
        providers:
          type: array
          items: { type: string }

    StoryboardResult:
      type: object
      required: [id, topic, status, providers, usedProviders, scenes, logs, createdAt, updatedAt]
      properties:
        id:                          { type: string }
        scriptId:                    { type: ["string", "null"] }
        researchId:                  { type: ["string", "null"] }
        topic:                       { type: string }
        title:                       { type: ["string", "null"] }
        status:
          type: string
          enum: [pending, running, completed, failed, cached]
        scriptStyle:                 { type: string }
        scriptTone:                  { type: string }
        targetDurationMinutes:       { type: integer }
        targetAudience:              { type: string }
        language:                    { type: string }
        version:                     { type: integer }
        scenes:
          type: array
          items: { $ref: "#/components/schemas/StoryboardScene" }
        sceneTimeline:
          type: array
          items: { type: object }
        narrationTiming:
          type: array
          items: { type: object }
        visualCues:
          type: array
          items: { type: object }
        totalDurationSeconds:         { type: ["integer", "null"] }
        sceneCount:                   { type: ["integer", "null"] }
        imageCount:                   { type: ["integer", "null"] }
        editingComplexityScore:       { type: ["number", "null"] }
        estimatedRenderTimeMinutes:   { type: ["integer", "null"] }
        estimatedCostUsd:             { type: ["number", "null"] }
        visualPacing:                 { type: ["string", "null"] }
        narrationPacing:              { type: ["string", "null"] }
        providers:
          type: array
          items: { type: string }
        usedProviders:
          type: array
          items: { type: string }
        jobId:          { type: ["string", "null"] }
        logs:
          type: array
          items: { type: string }
        errorMessage:   { type: ["string", "null"] }
        createdAt:      { type: string }
        updatedAt:      { type: string }
        completedAt:    { type: ["string", "null"] }

    StoryboardList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/StoryboardResult" }
        total: { type: integer }

    # ── Asset ────────────────────────────────────────────────────────────────
    AssetInput:
      type: object
      required: [storyboardId]
      properties:
        storyboardId:  { type: string }
        sceneIds:
          type: array
          items: { type: string }
          description: Empty = all scenes in the storyboard
        assetKinds:
          type: array
          items:
            type: string
            enum: [image, video, svg, chart, map, icon]
        providers:
          type: array
          items: { type: string }
          description: Ordered preference list — stock providers searched first, then generation
        forceGenerate: { type: boolean }

    AssetResult:
      type: object
      required: [id, storyboardId, sceneId, assetKind, status, license, tags, logs, createdAt, updatedAt]
      properties:
        id:                  { type: string }
        storyboardId:        { type: string }
        sceneId:             { type: string }
        assetKind:
          type: string
          enum: [image, video, svg, chart, map, icon]
        provider:            { type: ["string", "null"] }
        providerAssetId:     { type: ["string", "null"] }
        sourceUrl:           { type: ["string", "null"] }
        license:
          type: string
          enum: [public_domain, cc0, cc_by, cc_by_sa, commercial, generated, mit, unknown]
        prompt:              { type: ["string", "null"] }
        negativePrompt:      { type: ["string", "null"] }
        generationParameters:
          type: object
          additionalProperties: {}
        width:               { type: ["integer", "null"] }
        height:              { type: ["integer", "null"] }
        aspectRatio:         { type: ["string", "null"] }
        status:
          type: string
          enum: [pending, searching, downloading, generating, ready, failed, cached]
        costEstimateUsd:     { type: ["number", "null"] }
        generationTimeMs:    { type: ["integer", "null"] }
        fileSizeBytes:       { type: ["integer", "null"] }
        localCachePath:      { type: ["string", "null"] }
        thumbnailPath:       { type: ["string", "null"] }
        tags:
          type: array
          items: { type: string }
        qualityScore:        { type: ["number", "null"] }
        relevanceScore:      { type: ["number", "null"] }
        logs:
          type: array
          items: { type: string }
        errorMessage:        { type: ["string", "null"] }
        createdAt:           { type: string }
        updatedAt:           { type: string }
        completedAt:         { type: ["string", "null"] }

    AssetList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AssetResult" }
        total: { type: integer }

    AssetAcquireResponse:
      type: object
      required: [items, total, message]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AssetResult" }
        total:   { type: integer }
        message: { type: string }

    AssetProviderStats:
      type: object
      required: [providerName, providerType, isEnabled, totalRequests, successfulRequests, failedRequests, cacheHits, totalCostUsd]
      properties:
        providerName:       { type: string }
        providerType:
          type: string
          enum: [stock, generate, icon]
        isEnabled:           { type: boolean }
        totalRequests:       { type: integer }
        successfulRequests:  { type: integer }
        failedRequests:      { type: integer }
        avgLatencyMs:        { type: ["number", "null"] }
        avgCostUsd:          { type: ["number", "null"] }
        totalCostUsd:        { type: number }
        cacheHits:           { type: integer }
        supportedKinds:
          type: array
          items: { type: string }

    AssetProviderStatsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AssetProviderStats" }

    # ── Voices ───────────────────────────────────────────────────────────────
    VoiceInput:
      type: object
      required: [scriptId]
      properties:
        scriptId:   { type: string }
        voiceId:    { type: string }
        speed:      { type: number, minimum: 0.5, maximum: 2.0 }
        language:   { type: string }
        targetLoudnessLufs: { type: number }
        providers:
          type: array
          items:
            type: string
            enum: [openai-tts, elevenlabs]

    VoiceSectionAudio:
      type: object
      required: [sectionIndex, sectionTitle, text, startMs, endMs, durationMs, localPath]
      properties:
        sectionIndex:  { type: integer }
        sectionTitle:  { type: string }
        text:          { type: string }
        startMs:       { type: integer }
        endMs:         { type: integer }
        durationMs:    { type: integer }
        wordCount:     { type: integer }
        localPath:     { type: string }
        sampleRate:    { type: integer }

    VoiceResult:
      type: object
      required: [id, scriptId, status, voiceId, sections, providers, logs, createdAt, updatedAt]
      properties:
        id:              { type: string }
        scriptId:        { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed, cached]
        voiceId:         { type: string }
        speed:           { type: number }
        language:        { type: string }
        sections:
          type: array
          items: { $ref: "#/components/schemas/VoiceSectionAudio" }
        totalDurationMs: { type: ["integer", "null"] }
        wordCount:       { type: ["integer", "null"] }
        sampleRate:      { type: ["integer", "null"] }
        audioFormat:     { type: ["string", "null"] }
        normalized:      { type: boolean }
        targetLoudnessLufs: { type: number }
        costUsd:         { type: ["number", "null"] }
        usedProvider:    { type: ["string", "null"] }
        providers:
          type: array
          items: { type: string }
        jobId:           { type: ["string", "null"] }
        logs:
          type: array
          items: { type: string }
        errorMessage:    { type: ["string", "null"] }
        createdAt:       { type: string }
        updatedAt:       { type: string }
        completedAt:     { type: ["string", "null"] }

    VoiceList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/VoiceResult" }
        total: { type: integer }

    VoiceProviderStats:
      type: object
      required: [providerName, isEnabled, totalRequests, successfulRequests, failedRequests, totalCostUsd]
      properties:
        providerName:       { type: string }
        isEnabled:           { type: boolean }
        totalRequests:       { type: integer }
        successfulRequests:  { type: integer }
        failedRequests:      { type: integer }
        avgLatencyMs:        { type: ["number", "null"] }
        avgCostUsd:          { type: ["number", "null"] }
        totalCostUsd:        { type: number }
        totalDurationMsGenerated: { type: integer }

    VoiceProviderStatsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/VoiceProviderStats" }

    # ── Timelines ────────────────────────────────────────────────────────────
    TimelineInput:
      type: object
      required: [storyboardId]
      properties:
        storyboardId:  { type: string }
        scriptId:      { type: ["string", "null"] }
        renderFormat:
          type: string
          enum: [mp4, webm]
        fps:    { type: integer, minimum: 24, maximum: 60 }
        width:  { type: integer }
        height: { type: integer }

    TimelineClip:
      type: object
      required: [clipId, trackId, sceneId, assetKind, startMs, endMs, durationMs]
      properties:
        clipId:      { type: string }
        trackId:     { type: string }
        sceneId:     { type: string }
        assetId:     { type: ["string", "null"] }
        assetKind:   { type: string }
        startMs:     { type: integer }
        endMs:       { type: integer }
        durationMs:  { type: integer }
        sourceUrl:   { type: ["string", "null"] }
        localPath:   { type: ["string", "null"] }
        inPointMs:   { type: integer }
        outPointMs:  { type: ["integer", "null"] }
        volume:      { type: number }
        opacity:     { type: number }
        effects:     { type: array, items: { type: object } }

    TimelineTrack:
      type: object
      required: [trackId, kind, order, label, clips]
      properties:
        trackId:   { type: string }
        kind:
          type: string
          enum: [video, audio, subtitle, overlay]
        order:     { type: integer }
        label:     { type: string }
        clips:
          type: array
          items: { $ref: "#/components/schemas/TimelineClip" }
        isMuted:   { type: boolean }
        isLocked:  { type: boolean }

    TimelineScene:
      type: object
      required: [sceneId, sceneNumber, title, startMs, endMs, durationMs]
      properties:
        sceneId:              { type: string }
        sceneNumber:          { type: integer }
        title:                { type: string }
        startMs:              { type: integer }
        endMs:                { type: integer }
        durationMs:           { type: integer }
        hasVideoAsset:        { type: boolean }
        hasAudioPlaceholder:  { type: boolean }
        assetIds:             { type: array, items: { type: string } }
        transitionIn:         { type: string }
        transitionOut:        { type: string }
        narration:            { type: ["string", "null"] }
        visualDescription:    { type: ["string", "null"] }

    TimelineMarker:
      type: object
      required: [markerId, label, timestampMs, markerType]
      properties:
        markerId:    { type: string }
        label:       { type: string }
        timestampMs: { type: integer }
        markerType:  { type: string }
        color:       { type: ["string", "null"] }

    TimelineRenderPlan:
      type: object
      properties:
        width:                  { type: integer }
        height:                 { type: integer }
        fps:                    { type: integer }
        format:                 { type: string }
        codec:                  { type: string }
        audioCodec:             { type: string }
        bitrateKbps:            { type: integer }
        estimatedRenderTimeMs:  { type: ["integer", "null"] }

    TimelineMetadata:
      type: object
      properties:
        totalDurationMs:        { type: integer }
        totalScenes:            { type: integer }
        videoClipCount:         { type: integer }
        audioClipCount:         { type: integer }
        hasGaps:                { type: boolean }
        gapCount:               { type: integer }
        transitionCount:        { type: integer }
        estimatedFileSizeBytes: { type: ["integer", "null"] }
        assetCoveragePct:       { type: number }

    TimelineResult:
      type: object
      required: [id, storyboardId, topic, status, tracks, scenes, markers, validationErrors, logs, createdAt, updatedAt]
      properties:
        id:               { type: string }
        storyboardId:     { type: string }
        scriptId:         { type: ["string", "null"] }
        topic:            { type: string }
        title:            { type: ["string", "null"] }
        status:
          type: string
          enum: [pending, running, completed, failed]
        totalDurationMs:  { type: ["integer", "null"] }
        totalScenes:      { type: ["integer", "null"] }
        tracks:
          type: array
          items: { $ref: "#/components/schemas/TimelineTrack" }
        scenes:
          type: array
          items: { $ref: "#/components/schemas/TimelineScene" }
        markers:
          type: array
          items: { $ref: "#/components/schemas/TimelineMarker" }
        renderPlan:  { $ref: "#/components/schemas/TimelineRenderPlan" }
        metadata:    { $ref: "#/components/schemas/TimelineMetadata" }
        validationErrors:
          type: array
          items: { type: string }
        logs:
          type: array
          items: { type: string }
        errorMessage:   { type: ["string", "null"] }
        createdAt:      { type: string }
        updatedAt:      { type: string }
        completedAt:    { type: ["string", "null"] }

    TimelineList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/TimelineResult" }
        total: { type: integer }

    # ── Renders ──────────────────────────────────────────────────────────────
    RenderInput:
      type: object
      required: [timelineId]
      properties:
        timelineId:  { type: string }
        voiceId:     { type: ["string", "null"] }
        resolution:
          type: string
          enum: ["720p", "1080p", "4k"]
        fps:         { type: integer, minimum: 24, maximum: 60 }
        aspectRatio:
          type: string
          enum: ["16:9", "9:16", "1:1"]
        cropMode:
          type: string
          enum: [safe_crop, letterbox, blur_pad]
        hardwareAcceleration: { type: boolean }
        addBackgroundMusic:   { type: boolean }
        musicVolume:          { type: number, minimum: 0, maximum: 1 }
        generatePreview:      { type: boolean }

    RenderOutput:
      type: object
      properties:
        localPath:        { type: ["string", "null"] }
        fileSizeBytes:    { type: integer }
        durationSeconds:  { type: number }
        width:            { type: integer }
        height:           { type: integer }
        fps:              { type: integer }
        codec:            { type: string }
        audioCodec:       { type: string }
        format:           { type: string }

    RenderStats:
      type: object
      properties:
        renderTimeSeconds: { type: number }
        framesEncoded:     { type: integer }
        encodeFps:         { type: number }
        realtimeFactor:    { type: number }
        retries:           { type: integer }

    RenderMetadata:
      type: object
      properties:
        sceneCount:            { type: integer }
        clipCount:             { type: integer }
        placeholderClipCount:  { type: integer }
        hasNarration:          { type: boolean }
        hasBackgroundMusic:    { type: boolean }
        sourceTimelineId:      { type: string }
        sourceVoiceId:         { type: ["string", "null"] }

    RenderResult:
      type: object
      required: [id, timelineId, status, logs, createdAt, updatedAt]
      properties:
        id:              { type: string }
        timelineId:      { type: string }
        voiceId:         { type: ["string", "null"] }
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:        { type: integer }
        resolution:      { type: string }
        width:           { type: integer }
        height:          { type: integer }
        fps:             { type: integer }
        aspectRatio:     { type: string }
        cropMode:        { type: string }
        hardwareAcceleration: { type: boolean }
        renderPlan:      { type: object, additionalProperties: {} }
        renderOutput:    { $ref: "#/components/schemas/RenderOutput" }
        renderStats:     { $ref: "#/components/schemas/RenderStats" }
        renderMetadata:  { $ref: "#/components/schemas/RenderMetadata" }
        previewOutput:   { $ref: "#/components/schemas/RenderOutput" }
        logs:
          type: array
          items: { type: string }
        errorMessage:    { type: ["string", "null"] }
        createdAt:       { type: string }
        updatedAt:       { type: string }
        completedAt:     { type: ["string", "null"] }

    RenderList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RenderResult" }
        total: { type: integer }

    RenderProviderStats:
      type: object
      required: [backend, totalRenders, completed, failed]
      properties:
        backend:               { type: string }
        totalRenders:          { type: integer }
        completed:             { type: integer }
        failed:                { type: integer }
        avgRenderTimeSeconds:  { type: number }
        avgRealtimeFactor:     { type: number }
        totalOutputSeconds:    { type: number }

    # ── Subtitles (Post-Processing) ─────────────────────────────────────────────
    SubtitleInput:
      type: object
      required: [renderId]
      properties:
        renderId:  { type: string }
        language:  { type: string }
        providers:
          type: array
          items:
            type: string
            enum: [whisper, script-narration]

    SubtitleWord:
      type: object
      required: [word, startMs, endMs, confidence]
      properties:
        word:       { type: string }
        startMs:    { type: integer }
        endMs:      { type: integer }
        confidence: { type: number }
        speaker:    { type: ["string", "null"] }

    SubtitleSentence:
      type: object
      required: [text, startMs, endMs]
      properties:
        text:       { type: string }
        startMs:    { type: integer }
        endMs:      { type: integer }
        confidence: { type: number }
        speaker:    { type: ["string", "null"] }

    SubtitleParagraph:
      type: object
      required: [text, startMs, endMs]
      properties:
        text:    { type: string }
        startMs: { type: integer }
        endMs:   { type: integer }

    SubtitleResult:
      type: object
      required: [id, renderId, status, words, sentences, paragraphs, logs, createdAt, updatedAt]
      properties:
        id:            { type: string }
        renderId:      { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed]
        language:      { type: string }
        usedProvider:  { type: ["string", "null"] }
        providers:
          type: array
          items: { type: string }
        words:
          type: array
          items: { $ref: "#/components/schemas/SubtitleWord" }
        sentences:
          type: array
          items: { $ref: "#/components/schemas/SubtitleSentence" }
        paragraphs:
          type: array
          items: { $ref: "#/components/schemas/SubtitleParagraph" }
        srtContent:  { type: ["string", "null"] }
        vttContent:  { type: ["string", "null"] }
        assContent:  { type: ["string", "null"] }
        srtPath:     { type: ["string", "null"] }
        vttPath:     { type: ["string", "null"] }
        assPath:     { type: ["string", "null"] }
        burnedMetadata:          { type: object, additionalProperties: {} }
        animatedCaptionMetadata: { type: object, additionalProperties: {} }
        karaokeMetadata:         { type: object, additionalProperties: {} }
        style:                   { type: object, additionalProperties: {} }
        captionPresets:
          type: array
          items: { type: object, additionalProperties: {} }
        speakerMetadata:
          type: array
          items: { type: object, additionalProperties: {} }
        avgConfidence: { type: ["number", "null"] }
        wordCount:     { type: ["integer", "null"] }
        durationMs:    { type: ["integer", "null"] }
        logs:
          type: array
          items: { type: string }
        errorMessage: { type: ["string", "null"] }
        createdAt:    { type: string }
        updatedAt:    { type: string }
        completedAt:  { type: ["string", "null"] }

    SubtitleList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/SubtitleResult" }
        total: { type: integer }

    # ── Thumbnails (Post-Processing) ────────────────────────────────────────────
    ThumbnailInput:
      type: object
      required: [renderId]
      properties:
        renderId: { type: string }
        count:    { type: integer, minimum: 1, maximum: 10 }

    ThumbnailCandidate:
      type: object
      required: [candidateId, timestampMs, path, width, height, sharpnessScore, qualityScore, brightness]
      properties:
        candidateId:      { type: string }
        timestampMs:      { type: integer }
        path:             { type: string }
        width:            { type: integer }
        height:           { type: integer }
        sharpnessScore:   { type: number }
        qualityScore:     { type: number }
        brightness:       { type: number }
        dominantColor:    { type: ["string", "null"] }
        faceDetected:     { type: ["boolean", "null"] }
        objectsDetected:
          type: array
          items: { type: string }
        safeTextRegions:
          type: array
          items: { type: object, additionalProperties: {} }

    ThumbnailResult:
      type: object
      required: [id, renderId, status, candidates, selectedCandidateIds, logs, createdAt, updatedAt]
      properties:
        id:       { type: string }
        renderId: { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed]
        candidates:
          type: array
          items: { $ref: "#/components/schemas/ThumbnailCandidate" }
        selectedCandidateIds:
          type: array
          items: { type: string }
        templates:
          type: array
          items: { type: object, additionalProperties: {} }
        titleOverlay: { type: object, additionalProperties: {} }
        brandColors:
          type: array
          items: { type: string }
        logs:
          type: array
          items: { type: string }
        errorMessage: { type: ["string", "null"] }
        createdAt:    { type: string }
        updatedAt:    { type: string }
        completedAt:  { type: ["string", "null"] }

    ThumbnailList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ThumbnailResult" }
        total: { type: integer }

    # ── Chapters (Post-Processing) ──────────────────────────────────────────────
    ChapterInput:
      type: object
      required: [renderId]
      properties:
        renderId: { type: string }

    ChapterEntry:
      type: object
      required: [title, startMs, endMs]
      properties:
        title:       { type: string }
        startMs:     { type: integer }
        endMs:       { type: integer }
        description: { type: ["string", "null"] }

    ChapterResult:
      type: object
      required: [id, renderId, status, chapters, logs, createdAt, updatedAt]
      properties:
        id:       { type: string }
        renderId: { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed]
        chapters:
          type: array
          items: { $ref: "#/components/schemas/ChapterEntry" }
        youtubeExport: { type: ["string", "null"] }
        sources:       { type: object, additionalProperties: {} }
        logs:
          type: array
          items: { type: string }
        errorMessage: { type: ["string", "null"] }
        createdAt:    { type: string }
        updatedAt:    { type: string }
        completedAt:  { type: ["string", "null"] }

    ChapterList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ChapterResult" }
        total: { type: integer }

    # ── Production Assets (Post-Processing) ─────────────────────────────────────
    ProductionAssetResult:
      type: object
      required: [id, renderId, status, createdAt, updatedAt]
      properties:
        id:             { type: string }
        renderId:       { type: string }
        status:
          type: string
          enum: [pending, partial, completed]
        subtitleId:     { type: ["string", "null"] }
        thumbnailId:    { type: ["string", "null"] }
        chapterId:      { type: ["string", "null"] }
        subtitle:       { $ref: "#/components/schemas/SubtitleResult" }
        thumbnail:      { $ref: "#/components/schemas/ThumbnailResult" }
        chapter:        { $ref: "#/components/schemas/ChapterResult" }
        exportManifest: { type: object, additionalProperties: {} }
        createdAt:      { type: string }
        updatedAt:      { type: string }
        completedAt:    { type: ["string", "null"] }

    ProductionAssetList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProductionAssetResult" }
        total: { type: integer }
