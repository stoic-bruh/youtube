openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: Autonomous YouTube Factory API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Video project management
  - name: pipelines
    description: Pipeline execution and monitoring
  - name: jobs
    description: Background job management
  - name: services
    description: AI service execution
  - name: analytics
    description: Channel and video analytics
  - name: settings
    description: Application configuration
  - name: logs
    description: System log access

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Projects ──────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{id}/run:
    post:
      operationId: runProject
      tags: [projects]
      summary: Start the full pipeline for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Pipeline started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  # ── Pipelines ─────────────────────────────────────────────────────────────
  /pipelines:
    get:
      operationId: listPipelines
      tags: [pipelines]
      summary: List pipeline runs
      parameters:
        - name: project_id
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Pipeline list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineList"

  /pipelines/{id}:
    get:
      operationId: getPipeline
      tags: [pipelines]
      summary: Get pipeline run details and stage progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pipeline run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  /pipelines/{id}/cancel:
    post:
      operationId: cancelPipeline
      tags: [pipelines]
      summary: Cancel a running pipeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  /pipelines/{id}/retry:
    post:
      operationId: retryPipeline
      tags: [pipelines]
      summary: Retry a failed pipeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Retried
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  # ── Jobs ──────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List background jobs
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/retry:
    post:
      operationId: retryJob
      tags: [jobs]
      summary: Retry a failed job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Retried
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a pending or running job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  # ── Dashboard / Analytics ─────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Aggregate dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/pipeline-activity:
    get:
      operationId: getPipelineActivity
      tags: [analytics]
      summary: Recent pipeline activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityFeed"

  /analytics/stage-breakdown:
    get:
      operationId: getStageBreakdown
      tags: [analytics]
      summary: Pipeline stage success/failure breakdown
      responses:
        "200":
          description: Stage breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageBreakdown"

  # ── Logs ──────────────────────────────────────────────────────────────────
  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List system log entries
      parameters:
        - name: level
          in: query
          schema:
            type: ["string", "null"]
        - name: service
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogList"

  # ── Settings ──────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Project ──────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, title, status, topic, createdAt, updatedAt]
      properties:
        id:          { type: string }
        title:       { type: string }
        topic:       { type: string }
        description: { type: ["string", "null"] }
        status:
          type: string
          enum: [draft, queued, running, completed, failed, cancelled]
        thumbnailUrl:  { type: ["string", "null"] }
        videoUrl:      { type: ["string", "null"] }
        youtubeId:     { type: ["string", "null"] }
        youtubeUrl:    { type: ["string", "null"] }
        pipelineId:    { type: ["string", "null"] }
        tags:
          type: array
          items: { type: string }
        createdAt:   { type: string }
        updatedAt:   { type: string }

    ProjectInput:
      type: object
      required: [title, topic]
      properties:
        title:       { type: string }
        topic:       { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }

    ProjectUpdate:
      type: object
      properties:
        title:       { type: string }
        topic:       { type: string }
        description: { type: string }
        status:      { type: string }
        tags:
          type: array
          items: { type: string }

    ProjectList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Project" }
        total: { type: integer }

    # ── Pipeline ─────────────────────────────────────────────────────────────
    PipelineRun:
      type: object
      required: [id, projectId, status, stages, startedAt]
      properties:
        id:          { type: string }
        projectId:   { type: string }
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        currentStage: { type: ["string", "null"] }
        progress:     { type: integer }
        stages:
          type: array
          items: { $ref: "#/components/schemas/PipelineStage" }
        startedAt:    { type: string }
        completedAt:  { type: ["string", "null"] }
        errorMessage: { type: ["string", "null"] }

    PipelineStage:
      type: object
      required: [name, status, order]
      properties:
        name:       { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
        order:      { type: integer }
        startedAt:  { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }
        durationMs: { type: ["integer", "null"] }
        error:      { type: ["string", "null"] }

    PipelineList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PipelineRun" }
        total: { type: integer }

    # ── Job ──────────────────────────────────────────────────────────────────
    Job:
      type: object
      required: [id, type, status, createdAt]
      properties:
        id:          { type: string }
        type:        { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, retrying]
        projectId:   { type: ["string", "null"] }
        pipelineId:  { type: ["string", "null"] }
        payload:
          type: object
          additionalProperties: {}
        result:
          type: ["object", "null"]
          additionalProperties: {}
        error:       { type: ["string", "null"] }
        retryCount:  { type: integer }
        maxRetries:  { type: integer }
        createdAt:   { type: string }
        startedAt:   { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }

    JobList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Job" }
        total: { type: integer }

    # ── Analytics ────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalProjects, totalVideos, activeJobs, queuedJobs, successRate, totalRuntime]
      properties:
        totalProjects: { type: integer }
        totalVideos:   { type: integer }
        activeJobs:    { type: integer }
        queuedJobs:    { type: integer }
        failedJobs:    { type: integer }
        successRate:   { type: number }
        totalRuntime:  { type: integer }
        projectsByStatus:
          type: array
          items: { $ref: "#/components/schemas/StatusCount" }
        recentActivity:
          type: array
          items: { $ref: "#/components/schemas/ActivityItem" }

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count:  { type: integer }

    ActivityItem:
      type: object
      required: [id, type, message, timestamp]
      properties:
        id:        { type: string }
        type:      { type: string }
        message:   { type: string }
        projectId: { type: ["string", "null"] }
        status:    { type: ["string", "null"] }
        timestamp: { type: string }

    ActivityFeed:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ActivityItem" }

    StageBreakdown:
      type: object
      required: [stages]
      properties:
        stages:
          type: array
          items: { $ref: "#/components/schemas/StageStats" }

    StageStats:
      type: object
      required: [name, completed, failed, avgDurationMs]
      properties:
        name:          { type: string }
        completed:     { type: integer }
        failed:        { type: integer }
        avgDurationMs: { type: integer }

    # ── Logs ─────────────────────────────────────────────────────────────────
    LogEntry:
      type: object
      required: [id, level, message, service, timestamp]
      properties:
        id:        { type: string }
        level:
          type: string
          enum: [debug, info, warn, error]
        message:   { type: string }
        service:   { type: string }
        projectId: { type: ["string", "null"] }
        jobId:     { type: ["string", "null"] }
        meta:
          type: ["object", "null"]
          additionalProperties: {}
        timestamp: { type: string }

    LogList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/LogEntry" }
        total: { type: integer }

    # ── Settings ─────────────────────────────────────────────────────────────
    Settings:
      type: object
      required: [id, youtubeEnabled, autoUpload, defaultLanguage, maxConcurrentJobs, updatedAt]
      properties:
        id:                  { type: string }
        youtubeEnabled:      { type: boolean }
        autoUpload:          { type: boolean }
        defaultLanguage:     { type: string }
        maxConcurrentJobs:   { type: integer }
        openaiModel:         { type: string }
        imageProvider:       { type: string }
        voiceProvider:       { type: string }
        defaultVideoQuality: { type: string }
        notificationsEmail:  { type: ["string", "null"] }
        webhookUrl:          { type: ["string", "null"] }
        updatedAt:           { type: string }

    SettingsUpdate:
      type: object
      properties:
        youtubeEnabled:      { type: boolean }
        autoUpload:          { type: boolean }
        defaultLanguage:     { type: string }
        maxConcurrentJobs:   { type: integer }
        openaiModel:         { type: string }
        imageProvider:       { type: string }
        voiceProvider:       { type: string }
        defaultVideoQuality: { type: string }
        notificationsEmail:  { type: string }
        webhookUrl:          { type: string }
